<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета пользователя</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="text-info mb-4">Анкета пользователя</h1>

        <form method="POST" action="/">
            <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <input type="text" class="form-control bg-dark text-white" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="city" class="form-label">Город</label>
                <input type="text" class="form-control bg-dark text-white" id="city" name="city" required>
            </div>

            <div class="mb-3">
                <label for="hobby" class="form-label">Хобби</label>
                <input type="text" class="form-control bg-dark text-white" id="hobby" name="hobby" required>
            </div>

            <div class="mb-3">
                <label for="age" class="form-label">Возраст</label>
                <input type="number" class="form-control bg-dark text-white" id="age" name="age" min="1" max="120" required>
            </div>

            <button type="submit" class="btn btn-outline-info">Отправить анкету</button>
        </form>

        <hr class="text-white mt-4 mb-4">

        {% if user_data_list %}
            <h2 class="text-info mb-3">Введённые данные</h2>
            {% for user_data in user_data_list %}
                <div class="mb-3 border-bottom border-secondary pb-2">
                    <h5 class="mb-1">Имя: {{ user_data.name }}</h5>
                    <p class="mb-0"><strong>Город:</strong> {{ user_data.city }}</p>
                    <p class="mb-0"><strong>Хобби:</strong> {{ user_data.hobby }}</p>
                    <p class="mb-0"><strong>Возраст:</strong> {{ user_data.age }}</p>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Bootstrap 5 JS (если нужен) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
